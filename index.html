<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FourDeers - Stereoscopic 4D Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a0f;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #the_canvas_id {
            width: 100%;
            height: 100%;
            display: block;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-size: 18px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top: 3px solid #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading FourDeers...</div>
    </div>
    <canvas id="the_canvas_id" width="1280" height="720"></canvas>

    <script type="module">
        import init from './pkg/fourdeers.js';

        async function run() {
            try {
                // Wait for page to fully load
                if (document.readyState !== 'complete') {
                    await new Promise(resolve => window.addEventListener('load', resolve));
                }
                
                await init();
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error('Failed to initialize:', err);
                document.getElementById('loading').innerHTML = 
                    '<div style="color: #ff4444;">Error loading. Check console.</div>';
            }
        }

        run();
    </script>
</body>
</html>
